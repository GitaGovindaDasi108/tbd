<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Transcendental Book Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME — Transcendental Book Sales
   ============================================================ */
:root{
  --cream:#FBF6EC; --paper:#FFFDF8; --paper2:#FFF8EC;
  --saffron:#E07B26; --saffron-d:#C4661A; --marigold:#F2A93B;
  --gold:#B8862F; --gold-l:#E9CE86;
  --plum:#3B2A46; --ink:#2A2230; --muted:#7A6E63;
  --green:#2E7D4F; --green-l:#E3F1E8;
  --clay:#C0392B; --clay-l:#FBE7E4;
  --blue:#2F5D8A;
  --line:#EBDFC8; --line-d:#DCCBA8;
  --shadow:0 1px 2px rgba(59,42,70,.06), 0 8px 24px rgba(59,42,70,.08);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--ink); background:
    radial-gradient(1200px 500px at 50% -200px, #FDEFD6 0%, transparent 70%),
    var(--cream);
  min-height:100vh; -webkit-text-size-adjust:100%;
}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
:focus-visible{outline:2px solid var(--saffron-d);outline-offset:2px}

/* ---------- Header ---------- */
header.masthead{
  background:linear-gradient(180deg,#E88A32 0%, var(--saffron) 55%, var(--saffron-d) 100%);
  color:#FFF7EA; border-bottom:3px solid var(--gold);
}
/* Kept in normal flow so it stays put at any window width, full screen included. */
.util-bar{max-width:1280px;margin:0 auto;padding:7px 18px 0;
  display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap}
.status{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.18);
  padding:4px 10px;border-radius:999px;font-size:11.5px;color:#FFF3DE;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#bbb;box-shadow:0 0 0 3px rgba(255,255,255,.15);flex:none}
.dot.ok{background:#8FE3A6} .dot.bad{background:#FF9B8A} .dot.load{background:#FFD98A;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.btn-refresh{background:rgba(255,255,255,.16);color:#FFF7EA;border:1px solid rgba(255,255,255,.35);
  border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:600;white-space:nowrap}
.btn-refresh:active{transform:scale(.97)}

.masthead-inner{max-width:1280px;margin:0 auto;padding:6px 18px 12px;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px}
/* Photographs are shown whole — height is matched, width follows the picture. */
.deity{height:84px;flex:none;border-radius:10px;overflow:hidden;
  border:2px solid var(--gold-l);background:#7A3E12;
  box-shadow:0 2px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;text-align:center}
.deity img{height:84px;width:auto;display:block}
.deity span{font-family:'Marcellus',serif;font-size:11px;line-height:1.15;color:#FCE9C6;padding:6px 10px}
.title-block{text-align:center;min-width:0}
.title-block h1{font-family:'Marcellus',serif;font-weight:400;letter-spacing:.5px;
  font-size:clamp(19px,3.2vw,32px);line-height:1.1;text-shadow:0 1px 0 rgba(0,0,0,.15)}
.title-block .warehouse{color:#FFE7B8}
.mantra{font-family:'Marcellus',serif;font-style:italic;font-size:clamp(11px,1.6vw,14px);
  color:#FFEFD2;margin-top:4px;letter-spacing:.3px}

/* ---------- Layout ---------- */
main{max-width:1280px;margin:0 auto;padding:14px 18px 60px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:4px 0 12px}
.loc-tabs{display:flex;flex-wrap:wrap;gap:6px;flex:1;min-width:0}
.loc-tab{border:1.5px solid var(--line-d);background:var(--paper);color:var(--plum);
  padding:7px 14px;border-radius:999px;font-weight:600;font-size:14px;white-space:nowrap}
.loc-tab.active{background:var(--plum);color:#FFF3DE;border-color:var(--plum)}
.loc-tab.master{border-style:dashed}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:9px 14px;font-weight:600;font-size:14px;box-shadow:var(--shadow)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.55;pointer-events:none}
.btn-primary{background:var(--saffron);color:#fff}
.btn-plum{background:var(--plum);color:#FFF3DE}
.btn-gold{background:var(--gold);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:var(--paper);color:var(--plum);border:1.5px solid var(--line-d);box-shadow:none}
.btn-sm{padding:5px 10px;font-size:12.5px;border-radius:8px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:7px;box-shadow:none;font-weight:600}
.btn-danger{background:var(--clay-l);color:var(--clay);border:1px solid #EEC4bd;box-shadow:none}

/* ---------- Grand total bar ---------- */
.totals{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px}
.tcard{background:var(--paper);border:1px solid var(--line);border-radius:11px;
  padding:8px 12px 9px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-width:0}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--saffron-d)}
.tcard.aotm::before{background:var(--blue)}
.tcard.usd::before{background:var(--green)}
.tcard.pend::before{background:var(--clay)}
.tcard .label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  font-weight:700;line-height:1.3}
.tcard .value{font-family:'Marcellus',serif;font-size:clamp(20px,2.4vw,30px);color:var(--plum);
  margin-top:1px;line-height:1.1}
.tcard.usd .value{color:var(--green)} .tcard.pend .value{color:var(--clay)}
.tcard .sub{font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:2px}
.tcard .sub b{color:var(--plum);font-weight:700}

/* ---------- Panels ---------- */
.cols{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;align-items:stretch}
/* On desktop the log column holds its panel absolutely, so the column itself
   contributes no height. The row is therefore sized by the inventory alone and
   the log scrolls inside it instead of stretching the page. */
@media (min-width:901px){
  .log-col{position:relative}
  .log-col > .panel{position:absolute;inset:0}
}
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;margin-top:16px}
.cols-2.single{grid-template-columns:1fr}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel > h2{font-family:'Marcellus',serif;font-weight:400;font-size:18px;color:var(--plum);
  padding:12px 16px;border-bottom:1px solid var(--line);flex:none;
  background:linear-gradient(180deg,var(--paper2),transparent);display:flex;justify-content:space-between;align-items:center;gap:8px}
.panel .body{padding:12px 14px;flex:1;min-height:0;display:flex;flex-direction:column}

/* ---------- Inventory cards ---------- */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.book{border:1.5px solid var(--line-d);border-radius:12px;padding:11px 12px;background:var(--paper2);
  text-align:left;position:relative;min-height:104px;display:flex;flex-direction:column;justify-content:space-between}
.book .top:hover{box-shadow:none}
.book .top{cursor:default}
.book.sellable .top{cursor:pointer}
.book.sellable .top:active{transform:scale(.985)}
.book .bname{font-weight:700;font-size:14.5px;color:var(--plum);line-height:1.2}
.book .price{font-size:11.5px;color:var(--muted);margin-top:2px}
.book .qtyrow{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:6px}
.qty-chip{font-family:'Marcellus',serif;font-size:22px;color:var(--green);line-height:1}
.qty-chip.low{color:var(--gold)} .qty-chip.zero{color:var(--clay)}
.qty-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.resv{font-size:10.5px;color:var(--gold);font-weight:700;letter-spacing:.3px;margin-top:2px}
.flag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.4px}
.flag.display{background:#FCEFD0;color:var(--gold)} .flag.sold{background:var(--clay-l);color:var(--clay)}
.flag.held{background:#FCEFD0;color:var(--gold)}
.sold-tag{position:absolute;top:8px;right:8px}
.pre-btn{margin-top:8px;width:100%;background:transparent;color:var(--plum);border:1.5px solid var(--line-d);
  border-radius:8px;padding:5px;font-size:11.5px;font-weight:700;letter-spacing:.3px}
.pre-btn:hover{background:var(--plum);color:#FFF3DE;border-color:var(--plum)}
.tap-hint{font-size:10.5px;color:var(--saffron-d);font-weight:600}

/* ---------- Sales-by-title ---------- */
.title-list{display:flex;flex-direction:column;gap:2px}
.title-row{display:flex;justify-content:space-between;padding:7px 4px;border-bottom:1px dashed var(--line);font-size:14px}
.title-row:last-child{border-bottom:none}
.title-row .name{color:var(--ink)}
.title-row .count{font-family:'Marcellus',serif;color:var(--plum);font-size:16px}
.title-row .count b{color:var(--saffron-d)} .title-row .count i{color:var(--blue);font-style:normal}

/* ---------- Payments by type ---------- */
.pay-table{width:100%;border-collapse:collapse;font-size:13.5px}
.pay-table th,.pay-table td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--line)}
.pay-table th:first-child,.pay-table td:first-child{text-align:left}
.pay-table thead th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
.pay-table tfoot td{font-weight:700;color:var(--plum);border-top:2px solid var(--line-d);border-bottom:none}
.pay-table .usd{color:var(--green);font-weight:600}
.cur-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.cur-pill{background:var(--paper2);border:1px solid var(--line-d);border-radius:999px;padding:5px 11px;font-size:12.5px}
.cur-pill b{color:var(--plum)}

/* ---------- Logs ---------- */
.log{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  padding-right:6px;scrollbar-width:thin;scrollbar-color:var(--line-d) transparent}
.log::-webkit-scrollbar{width:10px}
.log::-webkit-scrollbar-track{background:var(--paper2);border-radius:99px}
.log::-webkit-scrollbar-thumb{background:var(--line-d);border-radius:99px;border:2px solid var(--paper2)}
.log::-webkit-scrollbar-thumb:hover{background:var(--gold)}
.log-item{border:1px solid var(--line);border-radius:9px;padding:7px 9px;background:var(--paper2);flex:none}
.log-item.pending{border-color:#EBC9A0;background:#FFF6E7}
.log-item.awaiting{border-color:#C7D6E8;background:#F4F8FC}
.log-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.log-title{font-weight:700;color:var(--plum);font-size:13px}
.badge{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:5px;letter-spacing:.4px;text-transform:uppercase;vertical-align:1px}
.badge.sale{background:var(--green-l);color:var(--green)}
.badge.pre{background:#E4ECF7;color:var(--blue)}
.badge.don{background:#F3E8F7;color:#8A4FA0}
.badge.pend{background:var(--clay-l);color:var(--clay)}
.badge.aotm{background:#EAF0F7;color:var(--blue)}
.badge.paid{background:var(--green-l);color:var(--green)}
.badge.elsewhere{background:#F1EDE3;color:var(--gold)}
.log-meta{font-size:10.5px;color:var(--muted);margin-top:1px;line-height:1.35}
.log-pay{font-size:11.5px;color:var(--ink);margin-top:1px}
.log-usd{font-family:'Marcellus',serif;color:var(--plum);font-size:14px;white-space:nowrap}
.log-actions{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.empty{color:var(--muted);font-size:13.5px;text-align:center;padding:20px 8px;font-style:italic}

.bottom-panels .panel{max-height:420px}
.pre-panel > h2{background:linear-gradient(180deg,#EAF1F9,transparent);color:var(--blue);font-size:16px;padding:9px 14px}
.pend-panel{border-color:#EBC9A0}
.pend-panel > h2{background:linear-gradient(180deg,#FFF1DA,transparent);color:var(--clay);font-size:16px;padding:9px 14px}
.bottom-panels .body{padding:10px 12px}
.bottom-panels .log{gap:5px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(43,34,48,.55);backdrop-filter:blur(2px);
  display:none;align-items:flex-start;justify-content:center;padding:20px;z-index:50;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--paper);border-radius:16px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);
  border:1px solid var(--line);margin:auto;animation:pop .12s ease;overflow:hidden}
.modal.wide{max-width:620px}
@keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
.modal h3{font-family:'Marcellus',serif;font-weight:400;font-size:21px;color:var(--gold-l);
  padding:14px 18px;background:var(--plum);display:flex;justify-content:space-between;align-items:center;gap:10px}
.modal h3 .x{background:none;border:none;color:var(--gold-l);font-size:22px;line-height:1;padding:0 2px}
.modal .m-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow:auto}
.modal .m-foot{padding:13px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--paper2)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{padding:10px 11px;border:1.5px solid var(--line-d);border-radius:9px;background:#fff;color:var(--ink)}
.field textarea{resize:vertical;min-height:52px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1.1fr .9fr 1fr;gap:8px}
.checkline{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);cursor:pointer;user-select:none}
.checkline input{width:18px;height:18px}
.warn{background:var(--clay-l);border:1px solid #EEC0b8;color:var(--clay);border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600}
.note{background:#EAF1F9;border:1px solid #C7D6E8;color:var(--blue);border-radius:9px;padding:10px 12px;font-size:13px}
.leg-box{border:1px dashed var(--line-d);border-radius:10px;padding:10px;background:var(--paper2)}
.leg-box .lg-title{font-size:11px;font-weight:700;color:var(--saffron-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.hint{font-size:12px;color:var(--muted)}
.opts{display:grid;gap:9px}
.opt{display:flex;flex-direction:column;gap:3px;text-align:left;background:var(--paper2);
  border:1.5px solid var(--line-d);border-radius:11px;padding:12px 14px;color:var(--ink);width:100%}
.opt:hover{border-color:var(--saffron);background:#FFF3E4}
.opt:active{transform:translateY(1px)}
.opt b{font-family:'Marcellus',serif;font-size:16.5px;color:var(--plum);font-weight:400}
.opt span{font-size:12px;color:var(--muted);line-height:1.4}
.opt[disabled]{opacity:.45;pointer-events:none}
.err{color:var(--clay);font-size:13px;font-weight:600}

/* ---------- Bulk grid ---------- */
.seg{display:flex;border:1.5px solid var(--line-d);border-radius:10px;overflow:hidden}
.seg button{flex:1;background:var(--paper);color:var(--muted);border:none;padding:9px 8px;font-size:12.5px;font-weight:700;letter-spacing:.3px}
.seg button.on{background:var(--plum);color:var(--gold-l)}
.bulk{display:flex;flex-direction:column}
.bulk-head,.bulk-row{display:grid;grid-template-columns:1fr 62px 92px 62px;gap:10px;align-items:center}
.bulk-head{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;
  padding:0 2px 6px;border-bottom:1px solid var(--line)}
.bulk-head span:not(:first-child),.bulk-row .num{text-align:center}
.bulk-row{padding:7px 2px;border-bottom:1px solid var(--line)}
.bulk-row:last-child{border-bottom:none}
.bulk-row .bn{font-family:'Marcellus',serif;font-size:15px;color:var(--saffron-d);line-height:1.2}
.bulk-row .bn.aotm{color:var(--blue)}
.bulk-row .num{font-size:13px;color:var(--muted);font-weight:600}
.bulk-row .num.next{color:var(--plum);font-weight:700}
.bulk-row .num.zero{color:var(--clay)}
.bulk-row input{width:100%;text-align:center;padding:8px 4px;border:1.5px solid var(--line-d);
  border-radius:8px;background:#fff;font-size:15px;font-weight:600;color:var(--ink)}
.bulk-sec{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);
  padding:10px 2px 4px;border-bottom:1px solid var(--line)}
.bulk-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:10px 12px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--muted)}
.bulk-foot b{font-family:'Marcellus',serif;font-size:18px;color:var(--plum)}

/* toast */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--plum);color:#FFF3DE;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:.25s;z-index:80;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--clay)}

/* ---------- Responsive ---------- */
@media (max-width:1080px){ .totals{grid-template-columns:repeat(2,1fr)} }
@media (max-width:900px){
  .cols{grid-template-columns:1fr} .cols-2{grid-template-columns:1fr}
  .log{max-height:420px}
  .deity{height:62px} .deity img{height:62px}
  .masthead-inner{gap:10px;padding:4px 12px 11px}
  .util-bar{justify-content:center;padding:8px 12px 0}
}
@media (max-width:560px){
  .totals{gap:7px}
  .row3{grid-template-columns:1fr 1fr}
  .inv-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  main{padding:12px 12px 60px}
  .bulk-head,.bulk-row{grid-template-columns:1fr 50px 80px 50px;gap:7px}
  .bulk-row .bn{font-size:13.5px}
}
@media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>
<body>

<header class="masthead">
  <div class="util-bar">
    <div class="status"><span class="dot load" id="dot"></span><span id="statusText">Starting…</span></div>
    <button class="btn-refresh" data-act="refresh">↻ Refresh</button>
    <button class="btn-refresh" data-act="syncsheet" title="Rebuild the Google Sheet tabs now">⇪ Sync sheet</button>
  </div>
  <div class="masthead-inner">
    <div class="deity" id="imgLeft"><span>Śrīla<br>Prabhupāda</span></div>
    <div class="title-block">
      <h1>Transcendental Book Sales<span class="warehouse" id="whTitle"></span></h1>
      <div class="mantra">gopī-bhartuḥ pada-kamalayor dāsa-dāsānudāsaḥ</div>
    </div>
    <div class="deity" id="imgRight"><span>Śrīla<br>Gurudeva</span></div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="loc-tabs" id="locTabs"></div>
    <div class="actions" id="ctxActions"></div>
  </div>

  <div class="totals" id="totals"></div>

  <div class="cols">
    <section class="panel">
      <h2 id="invHeading">Inventory <span class="hint" id="invHint"></span></h2>
      <div class="body"><div class="inv-grid" id="invGrid"></div></div>
    </section>
    <div class="log-col">
      <section class="panel">
        <h2>Active Sales Log <span class="hint" id="logCount"></span></h2>
        <div class="body"><div class="log" id="log"></div></div>
      </section>
    </div>
  </div>

  <div class="cols-2 bottom-panels" id="bottomRow" style="display:none">
    <section class="panel pre-panel" id="prePanel" style="display:none">
      <h2>Pre-Orders Awaiting Delivery</h2>
      <div class="body"><div class="log" id="preList"></div></div>
    </section>
    <section class="panel pend-panel" id="pendingPanel" style="display:none">
      <h2>Pending Payments</h2>
      <div class="body"><div class="log" id="pendingList"></div></div>
    </section>
  </div>

  <div class="cols-2">
    <section class="panel">
      <h2>Sales by Title <span class="hint">sold / pre-ordered</span></h2>
      <div class="body"><div class="title-list" id="titleList"></div></div>
    </section>
    <section class="panel">
      <h2>Totals by Payment Type</h2>
      <div class="body" id="payBody"></div>
    </section>
  </div>
</main>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script src="config.js"></script>
<script>
/* ============================================================
   CONFIG — real values live in config.js so that replacing this
   file from GitHub never disconnects you from your Sheet.
   ============================================================ */
const CONFIG = Object.assign({
  APPS_SCRIPT_URL: '',
  PRABHUPADA_IMG: 'Srila_Prabhupada.jpeg',
  GURUDEVA_IMG:   'Gurudeva.jpeg',
  POLL_SECONDS: 8
}, window.TBS_CONFIG || {});

const WAREHOUSE = 'WAREHOUSE';
const CUR_LABEL = { PLN:'PLN', EUR:'Euros', USD:'USD' };
const CUR_SYM   = { PLN:'zł',  EUR:'€',     USD:'$'   };

/* ------------------------------------------------------------
   HOW THIS STAYS FAST
   A round trip to Apps Script takes seconds and nothing can make
   it instant. So nobody waits for it. Every action is applied to
   a local copy at once and drawn immediately; the write goes out
   in the background. BASE is the last thing the server confirmed,
   OPS are our changes it has not confirmed yet, and STATE is the
   two combined. If a write is refused, its change is peeled back
   off and the reason is shown.
   ------------------------------------------------------------ */
let BASE = null;      // last confirmed server state
let REV  = -1;        // server revision that BASE corresponds to
let OPS  = [];        // optimistic changes awaiting confirmation
let STATE = null;     // BASE + OPS, what the screen shows
let CUR_LOC = WAREHOUSE;
let inflight = 0;
let syncTimer = null;

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => (Math.round((Number(n)||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
const tmpId = () => 'tmp_'+Math.random().toString(36).slice(2,10);

function toast(msg,isErr){const t=$('#toast');t.textContent=msg;t.className=isErr?'err show':'show';
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.className='',isErr?5000:2600);}
function setStatus(kind,text){$('#dot').className='dot '+kind;$('#statusText').textContent=text;}
const clock = () => new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});

function bookById(id){return (STATE.books||[]).find(b=>b.id===id)||{id,name:id,cat:'big',usd:0,pln:0,eur:0};}
function catOf(id){return bookById(id).cat==='aotm'?'aotm':'big';}
function isAotm(b){return b.cat==='aotm';}
function priceFor(book,cur){return cur==='PLN'?book.pln:cur==='EUR'?book.eur:book.usd;}
function toUSD(amt,cur){amt=Number(amt)||0;if(!amt)return 0;const r=STATE.rates||{plnPerUsd:3.79,eurPerUsd:.87};
  if(cur==='USD')return amt;if(cur==='PLN')return amt/r.plnPerUsd;if(cur==='EUR')return amt/r.eurPerUsd;return 0;}
function isPaid(s){return !s.pending || s.paid;}
function legs(s){const a=[];if(s.p1type)a.push({type:s.p1type,cur:s.p1cur,amt:Number(s.p1amt)||0});
  if(s.p2type)a.push({type:s.p2type,cur:s.p2cur,amt:Number(s.p2amt)||0});return a;}
function legsUSD(s){return legs(s).reduce((t,l)=>t+toUSD(l.amt,l.cur),0);}
function payLabel(s){const L=legs(s);if(!L.length)return '—';
  return L.map(l=>`${l.type} ${fmt(l.amt)} ${CUR_SYM[l.cur]||l.cur}`).join(' + ');}

function locName(loc){if(loc===WAREHOUSE)return (STATE.warehouseName||'')+' — Warehouse';
  const e=(STATE.events||[]).find(e=>e.eventId===loc);return e?e.name:loc;}
function scopedSales(){const s=STATE.sales||[];return CUR_LOC===WAREHOUSE?s:s.filter(x=>x.location===CUR_LOC);}
function invQty(loc,bookId){const rec=(STATE.inventory||[]).find(i=>i.location===loc&&i.bookId===bookId);return rec?rec.qty:0;}
function shownQty(bookId){return invQty(CUR_LOC,bookId);}
/* A pre-order not yet handed over holds a copy back from general sale. */
/* Copies spoken for by a pre-order that has not been handed over yet. */
function reservedQty(loc,bookId){
  return (STATE.sales||[]).filter(x=>x.type==='PREORDER'&&!x.delivered&&x.location===loc&&x.bookId===bookId).length;
}
function availQty(loc,bookId){return Math.max(0,invQty(loc,bookId)-reservedQty(loc,bookId));}

/* ============================================================
   TRANSPORT
   ============================================================ */
async function post(payload){
  if(!CONFIG.APPS_SCRIPT_URL) throw new Error('No Apps Script address set in config.js.');
  const res = await fetch(CONFIG.APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
  const txt = await res.text();
  let d; try{d=JSON.parse(txt);}catch(e){throw new Error('The server sent something unreadable. Check the deployment address and access settings.');}
  if(!d.ok) throw new Error(d.error||'That did not go through.');
  return d;
}

function derive(){
  if(!BASE) return null;
  const st = JSON.parse(JSON.stringify(BASE));
  OPS.forEach(op=>{ try{ op.apply(st); }catch(e){} });
  return st;
}

function cacheSave(){
  try{ localStorage.setItem('tbs_cache', JSON.stringify({rev:REV,state:BASE})); }catch(e){}
}
function cacheLoad(){
  try{
    const c=JSON.parse(localStorage.getItem('tbs_cache')||'null');
    if(c&&c.state&&c.state.books){ BASE=c.state; REV=c.rev; STATE=derive(); renderAll(); return true; }
  }catch(e){}
  return false;
}

async function pull(){
  const d = await post({action:'getState'});
  BASE = d.state; REV = d.rev;
  OPS = OPS.filter(o=>o.rev===undefined || o.rev>REV);   // drop what the server now includes
  if(CUR_LOC!==WAREHOUSE && !(BASE.events||[]).some(e=>e.eventId===CUR_LOC)) CUR_LOC=WAREHOUSE;
  STATE = derive(); cacheSave(); renderAll();
  setStatus(OPS.length?'load':'ok', OPS.length?('Saving '+OPS.length+'…'):('Up to date · '+clock()));
}

function scheduleSync(){ clearTimeout(syncTimer); syncTimer=setTimeout(()=>pull().catch(()=>{}), 900); }

/* Apply now, send in the background. */
function commit(payload, apply, okMsg){
  const op = { apply };
  OPS.push(op);
  STATE = derive(); renderAll(); closeModal();
  if(okMsg) toast(okMsg);

  inflight++; setStatus('load','Saving…');
  post(payload).then(d=>{
    op.rev = d.rev;
    scheduleSync();
  }).catch(err=>{
    OPS = OPS.filter(o=>o!==op);
    STATE = derive(); renderAll();
    toast('Not saved — '+err.message, true);
  }).finally(()=>{
    inflight--;
    if(!inflight) setStatus('ok','Saved · '+clock());
  });
}

/* Structural changes need an id from the server, so these do wait. */
async function commitSync(payload, okMsg){
  const btns=[...document.querySelectorAll('#modal .btn')]; btns.forEach(b=>b.disabled=true);
  setStatus('load','Saving…');
  try{
    await post(payload);
    await pull();
    closeModal();
    if(okMsg) toast(okMsg);
  }catch(err){
    btns.forEach(b=>b.disabled=false);
    const e=$('#modalErr'); if(e) e.textContent=err.message; else toast(err.message,true);
    setStatus('bad','Error');
  }
}

/* Cheap poll: one number. Only pulls the whole state when it changes. */
async function poll(){
  if(document.hidden || inflight) return;
  try{
    const d = await post({action:'ping'});
    if(d.rev !== REV) await pull();
    else if(!OPS.length) setStatus('ok','Up to date · '+clock());
  }catch(err){ setStatus('bad','Offline — retrying'); }
}

async function syncSheet(){
  setStatus('load','Rebuilding sheet…');
  try{ const d=await post({action:'syncSheets'}); BASE=d.state; REV=d.rev;
    OPS=OPS.filter(o=>o.rev===undefined||o.rev>REV); STATE=derive(); cacheSave(); renderAll();
    toast('Google Sheet rebuilt'); setStatus('ok','Up to date · '+clock());
  }catch(err){ toast(err.message,true); setStatus('bad','Error'); }
}

/* ---------- local mutators used by optimistic ops ---------- */
function invAdd(st,loc,bookId,delta){
  let r=st.inventory.find(i=>i.location===loc&&i.bookId===bookId);
  if(!r){r={location:loc,bookId,qty:0};st.inventory.push(r);}
  r.qty=Math.max(0,r.qty+delta);
}
function invSet(st,loc,bookId,qty){
  let r=st.inventory.find(i=>i.location===loc&&i.bookId===bookId);
  if(!r){r={location:loc,bookId,qty:0};st.inventory.push(r);}
  r.qty=Math.max(0,qty);
}
const findSale=(st,id)=>st.sales.find(x=>x.saleId===id);
function legFields(L){
  return {p1type:L[0]?L[0].type:'',p1cur:L[0]?L[0].cur:'',p1amt:L[0]?L[0].amt:0,
          p2type:L[1]?L[1].type:'',p2cur:L[1]?L[1].cur:'',p2amt:L[1]?L[1].amt:0};
}

/* ============================================================
   RENDER
   ============================================================ */
function renderAll(){
  if(!STATE) return;
  $('#whTitle').textContent = STATE.warehouseName ? (': '+STATE.warehouseName) : '';
  document.title = 'Book Sales — '+(STATE.warehouseName||'');
  renderTabs(); renderContextActions(); renderTotals();
  renderInventory(); renderTitleList(); renderPayments(); renderLog(); renderBottom();
}

function renderTabs(){
  let h=`<button class="loc-tab master ${CUR_LOC===WAREHOUSE?'active':''}" data-act="loc" data-loc="${WAREHOUSE}">🏠 ${esc(STATE.warehouseName||'Warehouse')} (All)</button>`;
  (STATE.events||[]).forEach(e=>{
    h+=`<button class="loc-tab ${CUR_LOC===e.eventId?'active':''}" data-act="loc" data-loc="${esc(e.eventId)}">${esc(e.name)}</button>`;
  });
  h+=`<button class="loc-tab" data-act="newevent" style="border-style:dashed;color:var(--saffron-d)">＋ New event</button>`;
  $('#locTabs').innerHTML=h;
}

function renderContextActions(){
  let h=`<button class="btn btn-gold" data-act="donation">♥ Donation</button>`;
  if(CUR_LOC===WAREHOUSE){
    h+=`<button class="btn btn-plum" data-act="stock">Adjust stock</button>`;
    h+=`<button class="btn btn-primary" data-act="transfer" data-mode="toevent">Transfer to event →</button>`;
  }else{
    h+=`<button class="btn btn-primary" data-act="transfer" data-mode="in">← Transfer in</button>`;
    h+=`<button class="btn btn-ghost" data-act="transfer" data-mode="return">Return to warehouse</button>`;
    h+=`<button class="btn btn-ghost btn-sm" data-act="stock">Adjust stock</button>`;
    h+=`<button class="btn btn-ghost btn-sm" data-act="renameevent">Rename</button>`;
    h+=`<button class="btn btn-danger btn-sm" data-act="deleteevent">Delete event</button>`;
  }
  $('#ctxActions').innerHTML=h;
}

function renderTotals(){
  const s=scopedSales();
  const n=(type,cat)=>s.filter(x=>x.type===type && x.bookId && catOf(x.bookId)===cat).length;
  const bigSold=n('SALE','big'), bigPre=n('PREORDER','big');
  const aotmSold=n('SALE','aotm'), aotmPre=n('PREORDER','aotm');

  let totUsd=0, pendUsd=0;
  const got={PLN:0,EUR:0,USD:0}, due={PLN:0,EUR:0,USD:0};
  s.forEach(x=>{
    const u=legsUSD(x);
    if(isPaid(x)){ totUsd+=u; legs(x).forEach(l=>{ if(got[l.cur]!==undefined) got[l.cur]+=l.amt; }); }
    else{ pendUsd+=u; legs(x).forEach(l=>{ if(due[l.cur]!==undefined) due[l.cur]+=l.amt; }); }
  });
  const money=o=>[
    o.PLN?`<b>${fmt(o.PLN)}</b> zł`:'', o.EUR?`<b>${fmt(o.EUR)}</b> €`:'', o.USD?`$<b>${fmt(o.USD)}</b>`:''
  ].filter(Boolean).join(' · ');

  $('#totals').innerHTML=`
    <div class="tcard"><div class="label">Big Books Total</div><div class="value">${bigSold+bigPre}</div>
      <div class="sub"><b>${bigSold}</b> sold · <b>${bigPre}</b> pre-ordered</div></div>
    <div class="tcard aotm"><div class="label">AoTM Total</div><div class="value">${aotmSold+aotmPre}</div>
      <div class="sub"><b>${aotmSold}</b> sold · <b>${aotmPre}</b> pre-ordered</div></div>
    <div class="tcard usd"><div class="label">Total Collections</div><div class="value">$${fmt(totUsd)}</div>
      <div class="sub">${money(got)||'nothing collected yet'}</div></div>
    <div class="tcard pend"><div class="label">Total Pending</div><div class="value">$${fmt(pendUsd)}</div>
      <div class="sub">${money(due)||'nothing outstanding'}</div></div>`;
}

function renderInventory(){
  $('#invHeading').firstChild.textContent = (CUR_LOC===WAREHOUSE?'Warehouse Inventory ':'Event Inventory ');
  $('#invHint').textContent = CUR_LOC===WAREHOUSE?'(stock on hand at the warehouse)':'(stock available at this event)';
  const s=scopedSales();
  let h='';
  (STATE.books||[]).forEach(b=>{
    const q=shownQty(b.id), held=reservedQty(CUR_LOC,b.id), avail=Math.max(0,q-held);
    const sold=s.filter(x=>x.type==='SALE'&&x.bookId===b.id).length;
    const sellable=avail>0;
    const cls=q<=0?'zero':avail<=1?'low':'';
    let flag='';
    if(q<=0) flag=`<span class="flag sold sold-tag">SOLD OUT</span>`;
    else if(avail<=0) flag=`<span class="flag held sold-tag">ALL PRE-ORDERED</span>`;
    else if(avail===1) flag=`<span class="flag display">DISPLAY BOOK</span>`;
    h+=`<div class="book ${sellable?'sellable':''}">
      ${(q<=0||avail<=0)?flag:''}
      <div class="top" ${sellable?`data-act="sell" data-book="${b.id}"`:''}>
        <div>
          <div class="bname">${esc(b.name)}</div>
          <div class="price">${b.pln} zł · ${b.eur} € · $${b.usd}</div>
        </div>
        <div class="qtyrow">
          <div><span class="qty-chip ${cls}">${q}</span> <span class="qty-label">on hand</span>
            ${held?`<div class="resv">${held} pre-ordered · ${avail} free</div>`:''}</div>
          <div style="text-align:right">${sellable?`<span class="tap-hint">tap to sell</span>`:''}<div class="qty-label">sold ${sold}</div></div>
        </div>
        ${(q>0&&avail===1)?`<div>${flag}</div>`:''}
      </div>
      <button class="pre-btn" data-act="preorder" data-book="${b.id}">Pre-order</button>
    </div>`;
  });
  $('#invGrid').innerHTML=h;
}

function renderTitleList(){
  const s=scopedSales(); let h='';
  (STATE.books||[]).forEach(b=>{
    const sold=s.filter(x=>x.type==='SALE'&&x.bookId===b.id).length;
    const pre=s.filter(x=>x.type==='PREORDER'&&x.bookId===b.id).length;
    h+=`<div class="title-row"><span class="name">${esc(b.name)}</span>
      <span class="count"><b>${sold}</b> / <i>${pre}</i></span></div>`;
  });
  $('#titleList').innerHTML=h;
}

function renderPayments(){
  const s=scopedSales();
  const TYPES=STATE.payTypes||['Cash','Zelle','PayPal','Wise','Gift'];
  const table={}; TYPES.forEach(t=>table[t]={PLN:0,EUR:0,USD:0});
  const curTot={PLN:0,EUR:0,USD:0}; let donUsd=0;
  s.forEach(x=>{
    if(!isPaid(x))return;
    legs(x).forEach(l=>{
      if(table[l.type]&&table[l.type][l.cur]!==undefined) table[l.type][l.cur]+=l.amt;
      if(curTot[l.cur]!==undefined) curTot[l.cur]+=l.amt;
      if(x.type==='DONATION') donUsd+=toUSD(l.amt,l.cur);
    });
  });
  let rows='';
  TYPES.forEach(t=>{
    const r=table[t]; const usd=toUSD(r.PLN,'PLN')+toUSD(r.EUR,'EUR')+toUSD(r.USD,'USD');
    rows+=`<tr><td>${t}</td><td>${fmt(r.PLN)}</td><td>${fmt(r.EUR)}</td><td>${fmt(r.USD)}</td><td class="usd">$${fmt(usd)}</td></tr>`;
  });
  const grandUsd=toUSD(curTot.PLN,'PLN')+toUSD(curTot.EUR,'EUR')+toUSD(curTot.USD,'USD');
  $('#payBody').innerHTML=`
    <table class="pay-table">
      <thead><tr><th>Type</th><th>zł PLN</th><th>€ EUR</th><th>$ USD</th><th>USD eq.</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td>All</td><td>${fmt(curTot.PLN)}</td><td>${fmt(curTot.EUR)}</td><td>${fmt(curTot.USD)}</td><td class="usd">$${fmt(grandUsd)}</td></tr></tfoot>
    </table>
    <div class="cur-strip">
      <span class="cur-pill">By currency &nbsp;·&nbsp; <b>${fmt(curTot.PLN)} zł</b></span>
      <span class="cur-pill"><b>${fmt(curTot.EUR)} €</b></span>
      <span class="cur-pill"><b>$${fmt(curTot.USD)}</b></span>
      <span class="cur-pill">Donations: <b>$${fmt(donUsd)}</b></span>
    </div>`;
}

function logItemHTML(x){
  const pending=!isPaid(x);
  const isDon=x.type==='DONATION';
  const awaiting = x.type==='PREORDER' && !x.delivered;
  const book=isDon?'Donation':bookById(x.bookId).name;
  const badge = x.type==='SALE'?'<span class="badge sale">Sale</span>'
    : x.type==='PREORDER'?'<span class="badge pre">Pre-order</span>'
    : '<span class="badge don">Donation</span>';
  const cat = (!isDon && catOf(x.bookId)==='aotm') ? '<span class="badge aotm">AoTM</span>' : '';
  const state = pending?'<span class="badge pend">Awaiting payment</span>'
              : (awaiting?'<span class="badge paid">Paid</span>':'');
  const src = x.dsource==='Other warehouse'?'<span class="badge elsewhere">From other warehouse</span>':'';
  const when=x.ts?new Date(x.ts).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
  const who=[x.name?esc(x.name):'', x.phone?esc(x.phone):'', x.comments?('“'+esc(x.comments)+'”'):'']
    .filter(Boolean).join(' · ');
  const locTag = CUR_LOC===WAREHOUSE && x.location!==WAREHOUSE ? ` · <b>${esc(locName(x.location))}</b>`:'';
  const onHand = awaiting ? invQty(x.location,x.bookId) : 0;
  return `<div class="log-item ${pending?'pending':''} ${awaiting&&!pending?'awaiting':''}">
    <div class="log-top">
      <div><span class="log-title">${esc(book)}</span> ${badge}${cat}${state}${src}</div>
      <div class="log-usd">$${fmt(legsUSD(x))}</div>
    </div>
    <div class="log-pay">${payLabel(x)}</div>
    <div class="log-meta">${who?who+' · ':''}${when}${locTag}${awaiting?` · <b>${onHand} on hand</b>`:''}</div>
    <div class="log-actions">
      ${pending?`<button class="btn btn-primary btn-xs" data-act="markpaid" data-id="${x.saleId}">Mark paid</button>`:''}
      ${awaiting?`<button class="btn btn-green btn-xs" data-act="deliver" data-id="${x.saleId}">Delivered</button>`:''}
      <button class="btn btn-ghost btn-xs" data-act="editsale" data-id="${x.saleId}">Edit</button>
      <button class="btn btn-danger btn-xs" data-act="delsale" data-id="${x.saleId}">Delete</button>
    </div>
  </div>`;
}

function renderLog(){
  const s=scopedSales().slice().sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  $('#logCount').textContent = s.length ? `(${s.length}, scroll for more)` : '';
  $('#log').innerHTML = s.length? s.map(logItemHTML).join('') : `<div class="empty">No sales yet. Tap a book to record the first one.</div>`;
}

function renderBottom(){
  const s=scopedSales();
  const owed=s.filter(x=>x.type==='PREORDER'&&!x.delivered).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const unpaid=s.filter(x=>!isPaid(x)).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const pre=$('#prePanel'), pend=$('#pendingPanel'), row=$('#bottomRow');
  pre.style.display = owed.length?'':'none';
  pend.style.display = unpaid.length?'':'none';
  row.style.display = (owed.length||unpaid.length)?'':'none';
  row.classList.toggle('single', !(owed.length&&unpaid.length));
  if(owed.length) $('#preList').innerHTML=owed.map(logItemHTML).join('');
  if(unpaid.length) $('#pendingList').innerHTML=unpaid.map(logItemHTML).join('');
}

/* ============================================================
   MODALS
   ============================================================ */
function openModal(html,wide){
  const m=$('#modal'); m.className='modal'+(wide?' wide':''); m.innerHTML=html;
  $('#overlay').classList.add('show');
}
function closeModal(){$('#overlay').classList.remove('show');}
$('#overlay').addEventListener('click',e=>{if(e.target===$('#overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

const mHead = t => `<h3>${esc(t)}<button class="x" onclick="closeModal()" aria-label="Close">×</button></h3>`;

function payTypeOptions(includeMixed,includeGift){
  const base=(STATE.payTypes||['Cash','Zelle','PayPal','Wise','Gift']).filter(t=>includeGift||t!=='Gift');
  let opts=base.map(t=>`<option value="${t}">${t}</option>`).join('');
  if(includeMixed) opts+=`<option value="Mixed">Mixed (two payments)</option>`;
  return opts;
}
function curOptions(sel){return ['PLN','EUR','USD'].map(c=>`<option value="${c}" ${sel===c?'selected':''}>${CUR_LABEL[c]}</option>`).join('');}

/* ---- Sale / Pre-order / Edit ---- */
function saleModal(opts){
  const book=bookById(opts.bookId);
  const loc=opts.loc||CUR_LOC;
  const isPre=!!opts.isPreorder;
  const edit=opts.edit||null;
  const onHand=invQty(loc,opts.bookId), held=reservedQty(loc,opts.bookId), avail=Math.max(0,onHand-held);
  const lastCopy = !isPre && !edit && avail===1;
  const title = edit?'Edit sale':(isPre?'Pre-order':'Record sale');
  // A pre-order hands over nothing today, so "book given now" would be wrong.
  const pendingLabel = isPre ? 'Payment pending (payment not yet delivered)'
                             : 'Payment pending (book given now, paid later)';

  openModal(`
    ${mHead(title+' — '+book.name)}
    <div class="m-body">
      ${lastCopy?`<div class="warn">⚠ This is the last free copy at ${esc(locName(loc))}.</div>`:''}
      ${isPre?`<div class="note">A pre-order holds a copy aside without handing it over. ${onHand} on hand here, ${held} already pre-ordered. Press <b>Delivered</b> in the log when the book changes hands.</div>`:''}
      <div class="field">
        <label>Payment type</label>
        <select id="ptype">${payTypeOptions(true,true)}</select>
      </div>

      <div id="singlePay">
        <div class="row2">
          <div class="field"><label>Currency</label><select id="pcur">${curOptions('PLN')}</select></div>
          <div class="field"><label>Amount</label><input id="pamt" type="number" step="0.01" inputmode="decimal"></div>
        </div>
      </div>

      <div id="mixedPay" style="display:none">
        <div class="leg-box"><div class="lg-title">Payment 1</div>
          <div class="row3">
            <div class="field"><label>Type</label><select id="m1type">${payTypeOptions(false,true)}</select></div>
            <div class="field"><label>Curr.</label><select id="m1cur">${curOptions('PLN')}</select></div>
            <div class="field"><label>Amount</label><input id="m1amt" type="number" step="0.01" inputmode="decimal"></div>
          </div>
        </div>
        <div class="leg-box" style="margin-top:8px"><div class="lg-title">Payment 2</div>
          <div class="row3">
            <div class="field"><label>Type</label><select id="m2type">${payTypeOptions(false,true)}</select></div>
            <div class="field"><label>Curr.</label><select id="m2cur">${curOptions('USD')}</select></div>
            <div class="field"><label>Amount</label><input id="m2amt" type="number" step="0.01" inputmode="decimal"></div>
          </div>
        </div>
      </div>

      <label class="checkline"><input type="checkbox" id="pending"> ${pendingLabel}</label>
      <div id="nameBox" style="display:${isPre?'block':'none'}">
        <div class="row2">
          <div class="field"><label>Name</label><input id="cname" type="text"></div>
          <div class="field"><label>Phone</label><input id="cphone" type="tel" inputmode="tel"></div>
        </div>
      </div>
      <div class="field"><label>Comments (optional)</label><textarea id="ccomments"></textarea></div>
      <div class="err" id="modalErr"></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveSale">${edit?'Save changes':(isPre?'Record pre-order':'Record sale')}</button>
    </div>
  `);

  const ptype=$('#ptype'), pcur=$('#pcur'), pamt=$('#pamt');
  const basePrice = c => priceFor(book,c);

  function syncSingleAmount(){
    if(ptype.value==='Gift'){pamt.value=0;pamt.disabled=true;}
    else{pamt.disabled=false; if(!pamt.dataset.touched) pamt.value=basePrice(pcur.value);}
  }
  function togglePay(){
    const mixed=ptype.value==='Mixed';
    $('#singlePay').style.display=mixed?'none':'block';
    $('#mixedPay').style.display=mixed?'block':'none';
    if(!mixed) syncSingleAmount();
  }
  ptype.addEventListener('change',togglePay);
  pcur.addEventListener('change',()=>{pamt.dataset.touched='';syncSingleAmount();});
  pamt.addEventListener('input',()=>{pamt.dataset.touched='1';});
  $('#pending').addEventListener('change',e=>{ if(!isPre) $('#nameBox').style.display=e.target.checked?'block':'none'; });

  if(edit){
    const L=legs(edit);
    if(L.length>1){ ptype.value='Mixed'; togglePay();
      $('#m1type').value=L[0].type;$('#m1cur').value=L[0].cur;$('#m1amt').value=L[0].amt;
      $('#m2type').value=L[1].type;$('#m2cur').value=L[1].cur;$('#m2amt').value=L[1].amt;
    }else if(L.length===1){ ptype.value=L[0].type; togglePay(); pcur.value=L[0].cur; pamt.value=L[0].amt; pamt.dataset.touched='1';
      if(L[0].type==='Gift') pamt.disabled=true;
    }
    $('#pending').checked=!!edit.pending;
    $('#nameBox').style.display=(isPre||edit.pending)?'block':'none';
    $('#cname').value=edit.name||''; $('#cphone').value=edit.phone||'';
    $('#ccomments').value=edit.comments||'';
  }else{
    togglePay();
  }

  $('#saveSale').addEventListener('click',()=>{
    let L=[];
    if(ptype.value==='Mixed'){
      L=[{type:$('#m1type').value,cur:$('#m1cur').value,amt:Number($('#m1amt').value)||0},
         {type:$('#m2type').value,cur:$('#m2cur').value,amt:Number($('#m2amt').value)||0}];
    }else if(ptype.value==='Gift'){
      L=[{type:'Gift',cur:pcur.value,amt:0}];
    }else{
      L=[{type:ptype.value,cur:pcur.value,amt:Number(pamt.value)||0}];
    }
    const pending=$('#pending').checked;
    const name=$('#cname').value.trim(), phone=$('#cphone').value.trim(), comments=$('#ccomments').value.trim();
    if(pending && !name){$('#modalErr').textContent='Add a name so the pending payment can be traced.';return;}
    if(isPre && !name){$('#modalErr').textContent='Add a name so the pre-ordered copy can be matched to a person.';return;}

    if(edit){
      commit({action:'editSale',saleId:edit.saleId,type:edit.type,location:edit.location,bookId:edit.bookId,
              legs:L,pending,name,phone,comments},
        st=>{ const s=findSale(st,edit.saleId); if(!s)return;
              Object.assign(s, legFields(L), {pending,paid:!pending,name,phone,comments}); },
        'Sale updated');
    }else{
      const id=tmpId();
      commit({action:'sell',location:loc,bookId:opts.bookId,isPreorder:isPre,legs:L,pending,name,phone,comments},
        st=>{
          st.sales.push(Object.assign({saleId:id,ts:new Date().toISOString(),location:loc,
            type:isPre?'PREORDER':'SALE',bookId:opts.bookId,qty:1,pending,paid:!pending,
            delivered:!isPre,name,phone,comments}, legFields(L)));
          if(!isPre) invAdd(st,loc,opts.bookId,-1);
        },
        isPre?'Pre-order recorded':'Sale recorded');
    }
  });
}

/* ---- Delivering a pre-order ---- */
function deliverModal(id){
  const x=(STATE.sales||[]).find(s=>s.saleId===id); if(!x) return;
  const book=bookById(x.bookId);
  const onHand=invQty(x.location,x.bookId);
  const where=locName(x.location);

  openModal(`
    ${mHead('Deliver — '+book.name)}
    <div class="m-body">
      <div class="note">Where is this copy coming from? Either way it is counted as sold${x.name?' to '+esc(x.name):''}.</div>
      <div class="opts">
        <button class="opt" data-src="here" ${onHand<=0?'disabled':''}>
          <b>This warehouse</b>
          <span>${onHand<=0
            ? 'Nothing on hand at '+esc(where)+' to give.'
            : 'Takes one copy off the shelf. '+onHand+' on hand at '+esc(where)+'.'}</span>
        </button>
        <button class="opt" data-src="other">
          <b>Other warehouse</b>
          <span>Stock here is left exactly as it is — the copy came from somewhere else.</span>
        </button>
      </div>
      <div class="err" id="modalErr"></div>
    </div>
    <div class="m-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>
  `);

  $('#modal').querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const fromStock = btn.dataset.src==='here';
      if(fromStock && invQty(x.location,x.bookId)<=0){
        $('#modalErr').textContent='That copy has just gone. Deliver it from another warehouse instead.';
        return;
      }
      commit({action:'markDelivered',saleId:id,fromStock},
        st=>{const t=findSale(st,id); if(!t)return;
             t.type='SALE'; t.delivered=true;
             t.dsource = fromStock?'This warehouse':'Other warehouse';
             if(fromStock) invAdd(st,t.location,t.bookId,-1);},
        fromStock?'Delivered — one copy off the shelf':'Delivered from another warehouse');
    });
  });
}

    ${mHead(edit?'Rename event':'New event')}
    <div class="m-body">
      <div class="field"><label>Event name</label><input id="evname" type="text" placeholder="e.g. Gurudeva's Welcome" value="${edit?esc(locName(edit)):''}"></div>
      <div class="hint">Books reach an event by transferring stock from the warehouse.</div>
      <div class="err" id="modalErr"></div>
    </div>

  $('#saveEv').addEventListener('click',()=>{

/* ---- Shared builder: one row per title ---- */
function bulkRows(cols){
  const big=(STATE.books||[]).filter(b=>!isAotm(b));
  const aotm=(STATE.books||[]).filter(isAotm);
  const row=b=>{
    const c=cols(b);
    return `<div class="bulk-row">
      <div class="bn ${isAotm(b)?'aotm':''}">${esc(b.name)}</div>
      <div class="num">${c.left}</div>
      <div>${c.input}</div>
      <div class="num next" data-next="${b.id}">${c.right}</div>
    </div>`;
  };
  let h='<div class="bulk"><div class="bulk-sec">Big Books</div>'+big.map(row).join('');
  if(aotm.length) h+=`<div class="bulk-sec">AoTM — Adventures</div>`+aotm.map(row).join('');
  return h+'</div>';
}

/* ---- Adjust stock ---- */
function stockModal(){
  const loc=CUR_LOC;
  const where=loc===WAREHOUSE?(STATE.warehouseName||'')+' warehouse':locName(loc);
  const body = bulkRows(b=>({
    left: invQty(loc,b.id),
    input:`<input type="number" step="1" data-book="${b.id}" placeholder="0" inputmode="numeric">`,
    right: invQty(loc,b.id)
  }));

  openModal(`
    ${mHead('Adjust stock — '+where)}
    <div class="m-body">
      <div class="seg" id="modeSeg">
        <button data-mode="add" class="on">Add / remove</button>
        <button data-mode="set">Set exact count</button>
      </div>
      <div class="hint" id="modeHint">Enter how many arrived. Use a minus sign to take stock out — 25 on hand plus 12 becomes 37.</div>
      <div class="bulk-head"><span>Title</span><span>Now</span><span id="colLabel">Change</span><span>After</span></div>
      ${body}
      <div class="bulk-foot"><span>New total on hand</span><b id="footValue">0</b></div>
      <div class="err" id="modalErr"></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-plum" id="saveStock">Save stock</button>
    </div>`, true);

  let mode='add';
  const inputs=[...document.querySelectorAll('#modal input[data-book]')];
  function recalc(){
    let total=0;
    inputs.forEach(i=>{
      const id=i.dataset.book, now=invQty(loc,id);
      const v=i.value===''?null:Number(i.value);
      let next = mode==='add' ? now+(v||0) : (v===null?now:v);
      if(next<0) next=0;
      total+=next;
      const cell=document.querySelector(`#modal [data-next="${id}"]`);
      cell.textContent=next; cell.classList.toggle('zero', next===0);
    });
    $('#footValue').textContent=total;
  }
  inputs.forEach(i=>i.addEventListener('input',recalc));
  $('#modeSeg').addEventListener('click',e=>{
    const b=e.target.closest('button[data-mode]'); if(!b) return;
    mode=b.dataset.mode;
    [...$('#modeSeg').children].forEach(x=>x.classList.toggle('on',x===b));
    $('#colLabel').textContent = mode==='add'?'Change':'Set to';
    $('#modeHint').textContent = mode==='add'
      ? 'Enter how many arrived. Use a minus sign to take stock out — 25 on hand plus 12 becomes 37.'
      : 'Enter the exact count now on the shelf. Leave a title blank to keep it as it is.';
    inputs.forEach(i=>{i.value='';});
    recalc();
  });
  recalc();

  $('#saveStock').addEventListener('click',()=>{
    if(mode==='add'){
      const items=inputs.filter(i=>i.value!=='' && Number(i.value)!==0)
        .map(i=>({bookId:i.dataset.book,delta:Math.round(Number(i.value))}));
      if(!items.length){$('#modalErr').textContent='Enter an amount for at least one title.';return;}
      const short=items.find(it=>it.delta<0 && invQty(loc,it.bookId)+it.delta<0);
      if(short){$('#modalErr').textContent='Cannot remove more '+bookById(short.bookId).name+' than are on hand.';return;}
      commit({action:'adjustStockBulk',location:loc,items},
        st=>items.forEach(it=>invAdd(st,loc,it.bookId,it.delta)), 'Stock updated');
    }else{
      const items=inputs.filter(i=>i.value!=='')
        .map(i=>({bookId:i.dataset.book,qty:Math.max(0,Math.round(Number(i.value)))}));
      if(!items.length){$('#modalErr').textContent='Enter a count for at least one title.';return;}
      commit({action:'setStockBulk',location:loc,items},
        st=>items.forEach(it=>invSet(st,loc,it.bookId,it.qty)), 'Stock set');
    }
  });
}

/* ---- Transfer ---- */
function transferModal(mode){
  const events=STATE.events||[];
  if(mode==='toevent' && !events.length){ toast('Create an event first.',true); return; }

  let fromDefault=WAREHOUSE, toDefault='', lockFrom=false, lockTo=false, heading='Transfer stock';
  if(mode==='toevent'){ heading='Transfer to event'; toDefault=events[0].eventId; lockFrom=true; }
  if(mode==='in'){ heading='Transfer into '+locName(CUR_LOC); toDefault=CUR_LOC; lockFrom=true; lockTo=true; }
  if(mode==='return'){ heading='Return to warehouse'; fromDefault=CUR_LOC; toDefault=WAREHOUSE; lockFrom=true; lockTo=true; }

  const locOpts=(sel)=>{
    let o=`<option value="${WAREHOUSE}" ${sel===WAREHOUSE?'selected':''}>${esc(STATE.warehouseName||'')} (Warehouse)</option>`;
    events.forEach(e=>o+=`<option value="${e.eventId}" ${sel===e.eventId?'selected':''}>${esc(e.name)}</option>`);
    return o;
  };
  const body = bulkRows(b=>({
    left:`<span data-avail="${b.id}">${invQty(fromDefault,b.id)}</span>`,
    input:`<input type="number" min="0" step="1" data-book="${b.id}" placeholder="0" inputmode="numeric">`,
    right:'0'
  }));

  openModal(`
    ${mHead(heading)}
    <div class="m-body">
      <div class="row2">
        <div class="field"><label>From</label><select id="tfrom" ${lockFrom?'disabled':''}>${locOpts(fromDefault)}</select></div>
        <div class="field"><label>To</label><select id="tto" ${lockTo?'disabled':''}>${locOpts(toDefault)}</select></div>
      </div>
      <div class="hint">Fill in every title you are carrying, then send the whole load at once. Transfers add to what is already there.</div>
      <div class="bulk-head"><span>Title</span><span>Avail.</span><span>Move</span><span>Left</span></div>
      ${body}
      <div class="bulk-foot"><span>Books in this load</span><b id="footValue">0</b></div>
      <div class="err" id="modalErr"></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveTransfer">Transfer</button>
    </div>`, true);

  const inputs=[...document.querySelectorAll('#modal input[data-book]')];
  function recalc(){
    const from=$('#tfrom').value;
    let load=0, over=false;
    inputs.forEach(i=>{
      const id=i.dataset.book, avail=invQty(from,id);
      document.querySelector(`#modal [data-avail="${id}"]`).textContent=avail;
      const q=Math.max(0,Math.round(Number(i.value)||0));
      const left=avail-q; if(left<0) over=true; load+=q;
      const cell=document.querySelector(`#modal [data-next="${id}"]`);
      cell.textContent=left; cell.classList.toggle('zero', left<=0);
    });
    $('#footValue').textContent=load;
    $('#modalErr').textContent = over ? 'One or more titles exceed what is on hand.' : '';
  }
  inputs.forEach(i=>i.addEventListener('input',recalc));
  $('#tfrom').addEventListener('change',recalc);
  recalc();

  $('#saveTransfer').addEventListener('click',()=>{
    const from=$('#tfrom').value, to=$('#tto').value;
    if(from===to){$('#modalErr').textContent='Pick two different locations.';return;}
    const items=inputs.filter(i=>Number(i.value)>0)
      .map(i=>({bookId:i.dataset.book,qty:Math.round(Number(i.value))}));
    if(!items.length){$('#modalErr').textContent='Enter a quantity for at least one title.';return;}
    const bad=items.find(it=>it.qty>invQty(from,it.bookId));
    if(bad){$('#modalErr').textContent='Not enough '+bookById(bad.bookId).name+' at '+locName(from)+'.';return;}
    commit({action:'transferBulk',from,to,items},
      st=>items.forEach(it=>{invAdd(st,from,it.bookId,-it.qty);invAdd(st,to,it.bookId,it.qty);}),
      'Stock transferred');
  });
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const a=t.dataset.act;
  if(a==='loc'){ CUR_LOC=t.dataset.loc; renderAll(); return; }
  if(a==='refresh'){ setStatus('load','Refreshing…'); pull().catch(err=>{setStatus('bad','Offline');toast(err.message,true);}); return; }
  if(a==='syncsheet'){ syncSheet(); return; }
  if(a==='newevent'){ eventModal(); return; }
  if(a==='renameevent'){ eventModal(CUR_LOC); return; }
  if(a==='deleteevent'){
    if(confirm('Delete "'+locName(CUR_LOC)+'"? Any remaining event stock returns to the warehouse and this event\'s sales are removed.'))
      commitSync({action:'deleteEvent',eventId:CUR_LOC},'Event deleted');
    return;
  }
  if(a==='donation'){ donationModal(); return; }
  if(a==='stock'){ stockModal(); return; }
  if(a==='transfer'){ transferModal(t.dataset.mode); return; }
  if(a==='sell'){ saleModal({bookId:t.dataset.book,isPreorder:false,loc:CUR_LOC}); return; }
  if(a==='preorder'){ saleModal({bookId:t.dataset.book,isPreorder:true,loc:CUR_LOC}); return; }

  if(a==='markpaid'){
    const id=t.dataset.id;
    commit({action:'markPaid',saleId:id},
      st=>{const s=findSale(st,id); if(s){s.pending=false;s.paid=true;}}, 'Marked paid');
    return;
  }
  if(a==='deliver'){ deliverModal(t.dataset.id); return; }
  if(a==='delsale'){
    const id=t.dataset.id;
    const s=(STATE.sales||[]).find(x=>x.saleId===id);
    const label=s?(s.type==='DONATION'?'this donation':bookById(s.bookId).name):'this record';
    if(!confirm('Delete '+label+'? '+(s&&s.type==='SALE'?'One copy will be returned to stock.':''))) return;
    commit({action:'deleteSale',saleId:id},
      st=>{const i=st.sales.findIndex(x=>x.saleId===id); if(i<0)return;
           const x=st.sales[i]; if(x.type==='SALE'&&x.bookId) invAdd(st,x.location,x.bookId,1);
           st.sales.splice(i,1);}, 'Deleted');
    return;
  }
  if(a==='editsale'){
    const s=(STATE.sales||[]).find(x=>x.saleId===t.dataset.id); if(!s)return;
    if(s.type==='DONATION'){ toast('To change a donation, delete it and add it again.',false); return; }
    saleModal({bookId:s.bookId,isPreorder:s.type==='PREORDER',loc:s.location,edit:s});
    return;
  }
});

  if(cacheLoad()) setStatus('load','Checking for changes…');

  setInterval(()=>{ if(!$('#overlay').classList.contains('show')) poll(); },
              Math.max(4,CONFIG.POLL_SECONDS)*1000);

})();
