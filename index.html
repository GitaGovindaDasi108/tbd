<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcendental Book Sales: Poland</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1209; --paper:#f5f0e8; --parchment:#ede5d0; --gold:#b8860b;
  --gold-light:#d4a017; --rust:#8b3a1a; --sage:#4a5e4a; --cream:#faf6ed;
  --border:#c8b89a; --low-stock:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--ink);min-height:100vh;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(184,134,11,.06) 27px,rgba(184,134,11,.06) 28px);}

/* HEADER */
header{background:var(--ink);border-bottom:3px solid var(--gold);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.header-img{height:90px;width:auto;object-fit:contain;border-radius:2px;box-shadow:2px 2px 8px rgba(0,0,0,.4);flex-shrink:0;}
.header-center{text-align:center;flex:1;}
header h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:.08em;color:var(--gold-light);}
header p{font-size:.7rem;letter-spacing:.18em;opacity:.55;margin-top:.3rem;color:var(--paper);}

/* CITY BAR */
.city-bar{background:var(--ink);padding:.6rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;border-bottom:2px solid var(--gold);}
.city-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);white-space:nowrap;}
.city-select{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:var(--gold-light);font-family:'DM Mono',monospace;font-size:.75rem;padding:.3rem .6rem;border-radius:2px;cursor:pointer;outline:none;}
.city-select option{background:var(--ink);color:var(--paper);}
.btn-city{padding:.3rem .75rem;background:none;border:1px solid rgba(255,255,255,.2);color:var(--gold-light);font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;cursor:pointer;border-radius:2px;text-transform:uppercase;white-space:nowrap;transition:all .15s;}
.btn-city:hover, .btn-city.active{background:rgba(255,255,255,.2);border-color:var(--gold-light);color:#fff;}

/* SYNC BAR */
.sync-bar{background:var(--parchment);border-bottom:1px solid var(--border);padding:.4rem 1.5rem;display:flex;align-items:center;gap:.75rem;font-size:.65rem;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;background:#ccc;}
.sync-dot.ok{background:#43a047;} .sync-dot.err{background:#e53935;} .sync-dot.pending{background:#ffa000;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-status{display:none;align-items:center;font-size:.62rem;padding:.2rem .5rem;border-radius:2px;}
.sync-status.ok{display:inline-flex;background:#e8f5e9;color:#2e7d32;}
.btn-sync{padding:.3rem .7rem;background:var(--ink);color:var(--gold-light);border:none;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;cursor:pointer;border-radius:2px;text-transform:uppercase;}

/* TOTALS BAR */
.totals-bar{background:var(--parchment);border-bottom:2px solid var(--border);padding:.75rem 2rem;display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;}
.total-item{text-align:center;}
.total-item .label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;opacity:.6;display:block;}
.total-item .value{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--gold);}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:1400px;margin:0 auto;padding:1.5rem;}
@media(max-width:800px){.main-grid{grid-template-columns:1fr;}}

/* PANELS */
.panel{background:var(--cream);border:1px solid var(--border);border-radius:2px;overflow:hidden;box-shadow:4px 4px 0 rgba(184,134,11,.12);display:flex;flex-direction:column;}
.panel-header{background:var(--ink);color:var(--paper);padding:.75rem 1.25rem;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.panel-header span{color:var(--gold-light);}

/* BOOK ROWS */
.book-row{display:flex;align-items:center;padding:.6rem 1.25rem;border-bottom:1px solid var(--border);gap:.5rem;justify-content:space-between;}
.book-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--rust);cursor:pointer;}
.stock-display{display:flex;align-items:center;gap:.4rem;}
.stock-num{font-size:1.4rem;font-family:'Cormorant Garamond',serif;font-weight:600;}

/* DISPLAY TOAST */
#display-toast{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold-light);border:1px solid var(--gold);border-radius:3px;padding:.75rem 1.5rem;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;z-index:500;box-shadow:4px 4px 0 rgba(0,0,0,.25);display:none;text-align:center;max-width:90vw;}
</style>
</head>
<body>

<div id="display-toast"></div>

<header>
  <div class="header-center">
    <h1>TRANSCENDENTAL BOOK SALES</h1>
    <p>POLAND TOUR</p>
  </div>
</header>

<!-- CITY BAR WITH WORKING BUTTONS -->
<div class="city-bar">
  <span class="city-label">City / Event:</span>
  <select class="city-select" id="city-select">
    <option value="Warsaw">Warsaw</option>
    <option value="Kraków">Kraków</option>
    <option value="Gdańsk">Gdańsk</option>
    <option value="Wrocław">Wrocław</option>
    <option value="Poznań">Poznań</option>
  </select>

  <button class="btn-city active" data-city="Warsaw">Warsaw</button>
  <button class="btn-city" data-city="Kraków">Kraków</button>
  <button class="btn-city" data-city="Gdańsk">Gdańsk</button>
  <button class="btn-city" data-city="Wrocław">Wrocław</button>
  <button class="btn-city" data-city="Poznań">Poznań</button>
</div>

<!-- SYNC BAR -->
<div class="sync-bar">
  <div><span class="sync-dot ok"></span> Status: Ready</div>
  <div class="sync-status ok">Connected</div>
  <button class="btn-sync" id="btn-sync">Sync Data</button>
</div>

<!-- TOTALS BAR -->
<div class="totals-bar">
  <div class="total-item">
    <span class="label">Current City</span>
    <span class="value" id="disp-current-city">Warsaw</span>
  </div>
  <div class="total-item">
    <span class="label">Total Books Sold</span>
    <span class="value" id="disp-total-books">0</span>
  </div>
  <div class="total-item">
    <span class="label">Total Revenue</span>
    <span class="value" id="disp-total-revenue">0 PLN</span>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main-grid">
  <div class="panel">
    <div class="panel-header">
      Available Inventory <span>(Click book to sell)</span>
    </div>
    <div id="book-list">
      <!-- Generated via JS -->
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      Recent Sales Log
    </div>
    <div id="sales-list" style="padding: 1rem;">
      <p style="opacity: 0.6; font-size: 0.75rem;">No sales logged for this city yet.</p>
    </div>
  </div>
</div>

<script>
// Data structure for cities
const cityData = {
  "Warsaw": { sold: 0, revenue: 0, inventory: { "Bhagavad-gita": 45, "Srimad-Bhagavatam": 20, "Krsna Book": 15 } },
  "Kraków": { sold: 0, revenue: 0, inventory: { "Bhagavad-gita": 30, "Srimad-Bhagavatam": 12, "Krsna Book": 10 } },
  "Gdańsk": { sold: 0, revenue: 0, inventory: { "Bhagavad-gita": 25, "Srimad-Bhagavatam": 15, "Krsna Book": 8 } },
  "Wrocław": { sold: 0, revenue: 0, inventory: { "Bhagavad-gita": 35, "Srimad-Bhagavatam": 18, "Krsna Book": 12 } },
  "Poznań": { sold: 0, revenue: 0, inventory: { "Bhagavad-gita": 20, "Srimad-Bhagavatam": 10, "Krsna Book": 5 } }
};

let currentCity = "Warsaw";

// Toast display helper
function showToast(message) {
  const toast = document.getElementById('display-toast');
  toast.innerText = message;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

// Function to switch active city
function setCity(cityName) {
  if (!cityData[cityName]) return;
  currentCity = cityName;

  // Update Select Dropdown
  document.getElementById('city-select').value = cityName;

  // Update Button States
  document.querySelectorAll('.btn-city').forEach(btn => {
    if (btn.getAttribute('data-city') === cityName) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  // Render UI for selected city
  renderDashboard();
  showToast(`Switched to ${cityName}`);
}

// Render inventory and metrics
function renderDashboard() {
  document.getElementById('disp-current-city').innerText = currentCity;
  const data = cityData[currentCity];

  document.getElementById('disp-total-books').innerText = data.sold;
  document.getElementById('disp-total-revenue').innerText = `${data.revenue} PLN`;

  const bookList = document.getElementById('book-list');
  bookList.innerHTML = '';

  Object.keys(data.inventory).forEach(book => {
    const row = document.createElement('div');
    row.className = 'book-row';
    row.innerHTML = `
      <span class="book-name" onclick="recordSale('${book}')">${book}</span>
      <div class="stock-display">
        <span class="stock-num">${data.inventory[book]}</span>
      </div>
    `;
    bookList.appendChild(row);
  });
}

// Function to record a quick sale
function recordSale(bookName) {
  const data = cityData[currentCity];
  if (data.inventory[bookName] > 0) {
    data.inventory[bookName]--;
    data.sold++;
    data.revenue += 40; // Default price 40 PLN per book
    
    const salesList = document.getElementById('sales-list');
    if (data.sold === 1) salesList.innerHTML = '';
    
    const entry = document.createElement('div');
    entry.style.fontSize = '0.75rem';
    entry.style.marginBottom = '0.4rem';
    entry.innerText = `• Sold 1x ${bookName} (40 PLN)`;
    salesList.prepend(entry);

    renderDashboard();
    showToast(`Sold 1x ${bookName}`);
  } else {
    showToast(`Out of stock for ${bookName}!`);
  }
}

// Attach Event Listeners to City Buttons & Select Dropdown
document.addEventListener('DOMContentLoaded', () => {
  // Button click handlers
  document.querySelectorAll('.btn-city').forEach(button => {
    button.addEventListener('click', (e) => {
      const selectedCity = e.target.getAttribute('data-city');
      setCity(selectedCity);
    });
  });

  // Dropdown change handler
  document.getElementById('city-select').addEventListener('change', (e) => {
    setCity(e.target.value);
  });

  // Manual sync button
  document.getElementById('btn-sync').addEventListener('click', () => {
    showToast("Data Synced Successfully!");
  });

  // Initial display setup
  renderDashboard();
});
</script>
</body>
</html>
